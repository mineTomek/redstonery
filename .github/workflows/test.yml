on:
  push:
  pull_request:
jobs:
  test:
    name: Test monorepo
    runs-on: ubuntu-latest # ? Use a matrix for better tests?
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test --reporter=junit --reporter-outfile=bun-tests.xml
      - name: Publish test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Bun test results
          path: bun-tests.xml
          reporter: java-junit
